name: Daily data refresh

on:
  schedule:
    - cron: '0 13 * * *'   # 13:00 UTC = 06:00 PT (PDT)
    - cron: '0 18 * * *'   # 18:00 UTC = 11:00 PT (PDT)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

# never let two refreshes run at once (e.g. cron + manual dispatch)
concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Ingest source requests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/ingest-requests.mjs
      - name: Fetch new papers
        # --max-add raised above the default 250: the wider collection clears a
        # one-time backlog (~500) on its first runs; the cap still guards against
        # a source dumping thousands of polluted records.
        run: |
          node scripts/update.mjs --days 90 --max-add 1000
          node scripts/build-site-data.mjs
      - name: Commit changes
        run: |
          git config user.name "research-tracker-bot"
          git config user.email "actions@github.com"
          git add data/ docs/data/
          if git diff --cached --quiet; then
            echo "No new papers."
          else
            git commit -m "data: daily refresh $(date -u +%F)"
            # main may have moved during the run — rebase and retry instead of failing.
            # During rebase, -X theirs favors the commit being replayed (our fresh data).
            for i in 1 2 3; do
              if git push; then exit 0; fi
              echo "push rejected, rebasing onto latest main (attempt $i)"
              git pull --rebase -X theirs origin main
            done
            git push
          fi
