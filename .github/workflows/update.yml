name: Daily data refresh

on:
  schedule:
    - cron: '0 13 * * *'   # 13:00 UTC daily = 06:00 PT
  workflow_dispatch:

permissions:
  contents: write

# never let two refreshes run at once (e.g. cron + manual dispatch)
concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch new papers
        run: |
          node scripts/update.mjs --days 90
          node scripts/build-site-data.mjs
      - name: Commit changes
        run: |
          git config user.name "research-tracker-bot"
          git config user.email "actions@github.com"
          git add data/papers.json docs/data/papers.json
          if git diff --cached --quiet; then
            echo "No new papers."
          else
            git commit -m "data: daily refresh $(date -u +%F)"
            git push
          fi
